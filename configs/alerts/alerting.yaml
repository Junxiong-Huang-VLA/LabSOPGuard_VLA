alerting:
  latency_target_ms: 200
  severity_threshold: medium
  cooldown_seconds: 10

channels:
  console:
    enabled: true
  websocket:
    enabled: true
    endpoint: "/ws"
  mqtt:
    enabled: true
    topic: "labsopguard/alerts"
  webhook:
    enabled: false
    url: ""

routing:
  high:
    - console
    - websocket
    - mqtt
    - webhook
  medium:
    - console
    - websocket
  low:
    - console

archive:
  alert_jsonl: outputs/predictions/alerts.jsonl
  retain_days: 180

video_analysis_rules:
  missing_gloves:
    severity: high
    color: "#E53935"
    title: "手套缺失"
    message: "未检测到防护手套，涉及手部接触样品、器皿或试剂时应立即补戴。"
    related_classes:
      - glove
      - gloves
      - gloved_hand
      - gloved-hand
      - hand
  missing_goggles:
    severity: high
    color: "#FB8C00"
    title: "护目镜缺失"
    message: "未检测到护目镜，进行称量、移液或试剂处理时应立即佩戴。"
    related_classes:
      - goggles
      - goggle
      - safety_glasses
      - protective_goggles
      - eyewear
  missing_lab_coat:
    severity: medium
    color: "#FDD835"
    title: "实验服缺失"
    message: "未检测到实验服，请在继续实验前补充基础躯干防护。"
    related_classes:
      - lab_coat
      - labcoat
      - white_coat
      - coat
