global:
  scrape_interval: 15s

rule_files:
  - prometheus-alerts.yml

scrape_configs:
  - job_name: lab_sop_guard_backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics

  - job_name: lab_sop_guard_wireless_video_sender
    static_configs:
      - targets: ['host.docker.internal:9301']
    metrics_path: /metrics

  - job_name: lab_sop_guard_wireless_video_receiver
    static_configs:
      - targets: ['host.docker.internal:9302']
    metrics_path: /metrics
