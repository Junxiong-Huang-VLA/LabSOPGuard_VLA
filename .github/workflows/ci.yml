name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Env check
        run: python scripts/check_env.py --project-name LabEmbodiedVLA
      - name: Data check
        run: python scripts/data_check.py --config configs/data/dataset.yaml || true
