name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-app/package-lock.json
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Env check
        run: python scripts/check_env.py --project-name LabEmbodiedVLA
      - name: Runtime config check
        run: |
          python scripts/check_runtime_configs.py
          docker compose -f docker-compose.yml --profile monitoring config --quiet
          docker run --rm -v "${{ github.workspace }}/monitoring:/etc/prometheus:ro" --entrypoint promtool prom/prometheus:latest check config /etc/prometheus/prometheus.yml
      - name: Project scope guard
        run: python scripts/check_project_scope.py
      - name: Data check
        run: python scripts/data_check.py --config configs/data/dataset.yaml || true
      - name: Backend pytest
        run: python -m pytest -q
      - name: Backend compileall
        run: python -m compileall -q backend src tests
      - name: Frontend TypeScript check
        run: |
          cd frontend-app
          npm ci --silent
          npx tsc --noEmit
      - name: Frontend build
        run: |
          cd frontend-app
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
