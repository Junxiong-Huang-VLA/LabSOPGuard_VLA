<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>实验视频自动分析系统 - integrated_system</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d7dfeb;
      --text: #1f2d3d;
      --muted: #5f6f82;
      --primary: #1368ce;
      --ok: #0f8a4b;
      --warn: #b26a00;
      --err: #bc1f2d;
    }
    body { margin: 0; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--text); background: linear-gradient(150deg, #eef4ff, #f9fbff 45%, #f2f8f6); }
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px 24px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; box-shadow: 0 6px 22px rgba(15, 42, 81, 0.06); margin-bottom: 14px; }
    h1 { margin: 8px 0 12px; font-size: 24px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    label.opt { display: flex; align-items: center; gap: 8px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; }
    input[type=file] { width: 100%; }
    button { background: var(--primary); color: white; border: 0; border-radius: 9px; padding: 10px 14px; cursor: pointer; }
    button.secondary { background: #415f80; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .progress { height: 14px; border-radius: 999px; background: #e6edf8; overflow: hidden; }
    .bar { height: 100%; width: 0; background: linear-gradient(90deg, #1d74de, #0f8a4b); transition: width .25s; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .status-ok { color: var(--ok); }
    .status-failed { color: var(--err); }
    .downloads button { margin-right: 8px; margin-bottom: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f7faff; border: 1px solid var(--line); border-radius: 10px; padding: 10px; max-height: 220px; overflow: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>实验视频自动分析系统</h1>
      <div class="muted">主线: <code>integrated_system</code> | 默认端口: <code>5001</code></div>
    </div>

    <div class="card">
      <h2>1. 上传视频与开关</h2>
      <div class="row" style="margin-bottom: 10px;">
        <input id="videoInput" type="file" accept="video/*" />
      </div>
      <div class="grid">
        <label class="opt"><input id="enableHand" type="checkbox" checked /> 手部检测</label>
        <label class="opt"><input id="enableAI" type="checkbox" checked /> AI 分析</label>
        <label class="opt"><input id="enablePDF" type="checkbox" checked /> PDF 报告</label>
        <label class="opt"><input id="enableStep" type="checkbox" checked /> 步骤检查</label>
        <label class="opt"><input id="enableVideo" type="checkbox" checked /> 导出标注视频</label>
      </div>
      <div class="row" style="margin-top: 12px;">
        <button id="startBtn">开始分析</button>
        <span id="taskIdText" class="muted"></span>
      </div>
    </div>

    <div class="card">
      <h2>2. 进度与状态</h2>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <div class="row" style="margin-top: 8px;">
        <div>进度: <b id="progressText">0%</b></div>
        <div>阶段: <b id="stageText">-</b></div>
        <div>状态: <b id="statusText">idle</b></div>
      </div>
      <div id="messageText" class="muted" style="margin-top: 6px;">等待任务开始</div>
    </div>

    <div class="card">
      <h2>3. 结果与下载</h2>
      <div class="downloads">
        <button class="secondary" data-type="annotated_video">下载标注视频</button>
        <button class="secondary" data-type="pdf">下载 PDF</button>
        <button class="secondary" data-type="keyframes_json">下载关键帧 JSON</button>
        <button class="secondary" data-type="analysis_json">下载 AI 分析 JSON</button>
        <button class="secondary" data-type="summary_txt">下载总结 TXT</button>
        <button class="secondary" data-type="alarm_log">下载报警日志</button>
      </div>
      <pre id="resultBox">暂无结果</pre>
    </div>

    <div class="card">
      <h2>4. 系统健康</h2>
      <div id="healthText" class="muted">检查中...</div>
    </div>
  </div>

  <script>
    let currentTaskId = "";
    let sse = null;
    let pollingTimer = null;

    const el = (id) => document.getElementById(id);
    const setProgress = (p) => {
      const pct = Math.max(0, Math.min(100, Number(p || 0)));
      el("bar").style.width = pct + "%";
      el("progressText").textContent = pct.toFixed(1) + "%";
    };

    async function refreshHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        el('healthText').innerHTML = `状态: <b class="status-ok">${data.status}</b> | API Key: <b>${data.api_key_configured ? '已配置' : '未配置'}</b> | 任务数: ${data.task_count}`;
      } catch (e) {
        el('healthText').innerHTML = `<span class="status-failed">健康检查失败: ${e}</span>`;
      }
    }

    async function fetchStatus() {
      if (!currentTaskId) return;
      const res = await fetch(`/api/status/${currentTaskId}`);
      const data = await res.json();
      if (!data.ok) return;
      setProgress(data.progress);
      el('stageText').textContent = data.current_stage || '-';
      el('statusText').textContent = data.status || '-';
      el('statusText').className = data.status === 'failed' ? 'status-failed' : (data.status === 'completed' ? 'status-ok' : '');
      el('messageText').textContent = data.message || '';
      el('resultBox').textContent = JSON.stringify(data, null, 2);
      if (data.status === 'completed' || data.status === 'failed') {
        if (pollingTimer) {
          clearInterval(pollingTimer);
          pollingTimer = null;
        }
      }
    }

    function connectSSE() {
      if (!currentTaskId) return;
      if (sse) sse.close();
      sse = new EventSource(`/api/progress?task_id=${currentTaskId}`);
      sse.onmessage = (evt) => {
        try {
          const d = JSON.parse(evt.data || '{}');
          if (d.type === 'heartbeat') return;
          setProgress(d.progress);
          el('stageText').textContent = d.current_stage || '-';
          el('messageText').textContent = d.message || '';
        } catch (_) {}
      };
      sse.onerror = () => {
        if (sse) sse.close();
      };
    }

    el('startBtn').addEventListener('click', async () => {
      const file = el('videoInput').files[0];
      if (!file) {
        alert('请先选择视频文件');
        return;
      }

      const form = new FormData();
      form.append('video', file);
      form.append('enable_hand_detection', el('enableHand').checked ? '1' : '0');
      form.append('enable_ai_analysis', el('enableAI').checked ? '1' : '0');
      form.append('enable_pdf', el('enablePDF').checked ? '1' : '0');
      form.append('enable_step_check', el('enableStep').checked ? '1' : '0');
      form.append('enable_video_export', el('enableVideo').checked ? '1' : '0');

      el('startBtn').disabled = true;
      el('messageText').textContent = '任务提交中...';

      try {
        const res = await fetch('/api/analyze', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || '任务提交失败');
        }

        currentTaskId = data.task_id;
        el('taskIdText').textContent = `task_id: ${currentTaskId}`;
        el('statusText').textContent = data.status;
        setProgress(data.progress || 0);
        connectSSE();

        if (pollingTimer) clearInterval(pollingTimer);
        pollingTimer = setInterval(fetchStatus, 1500);
        await fetchStatus();
      } catch (e) {
        el('messageText').textContent = `提交失败: ${e}`;
      } finally {
        el('startBtn').disabled = false;
      }
    });

    document.querySelectorAll('.downloads button').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!currentTaskId) {
          alert('请先运行任务');
          return;
        }
        const t = btn.getAttribute('data-type');
        window.open(`/api/download/${currentTaskId}/${t}`, '_blank');
      });
    });

    refreshHealth();
    setInterval(refreshHealth, 10000);
  </script>
</body>
</html>
