<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>实验视频自动分析系统 - integrated_system</title>
  <style>
    :root {
      --bg: #f2f6fb;
      --card: #ffffff;
      --line: #d6deea;
      --text: #1e2d3f;
      --muted: #5f6f82;
      --primary: #0f67cb;
      --ok: #0e8f4c;
      --warn: #b46a05;
      --err: #bd1f2f;
    }
    body {
      margin: 0;
      color: var(--text);
      background: linear-gradient(135deg, #ecf3ff 0%, #f8fbff 40%, #eef8f3 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap { max-width: 1100px; margin: 20px auto; padding: 0 14px 20px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(10, 35, 70, 0.06);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    .muted { color: var(--muted); }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 12px; }
    label.opt {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fafcff;
    }
    input[type=file] { width: 100%; }
    button {
      border: 0;
      border-radius: 9px;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
    }
    button.secondary { background: #3f5d80; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .progress { height: 14px; border-radius: 999px; background: #e5edf9; overflow: hidden; }
    .bar { height: 100%; width: 0; background: linear-gradient(90deg, #1b74de, #0e8f4c); transition: width 0.25s ease; }
    .status-ok { color: var(--ok); }
    .status-running { color: var(--warn); }
    .status-failed { color: var(--err); }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: #f6f9ff;
    }
    .pill.ok { border-color: #9fd9be; background: #edf9f2; color: var(--ok); }
    .pill.warn { border-color: #efcf92; background: #fff8ec; color: var(--warn); }
    .downloads button { margin-right: 8px; margin-bottom: 8px; }
    .file-hint { margin-top: 8px; font-size: 13px; color: var(--muted); }
    .file-links { margin-top: 8px; font-size: 13px; }
    .file-links a { margin-right: 10px; color: var(--primary); text-decoration: none; }
    .file-links a:hover { text-decoration: underline; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f7faff;
    }
    video {
      width: 100%;
      max-height: 330px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #000;
    }
    .keyframes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .kf { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fafcff; }
    .kf img { width: 100%; height: 95px; object-fit: cover; display: block; }
    .kf .cap { font-size: 12px; color: var(--muted); padding: 4px 6px; }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      border-radius: 10px;
      background: #133e70;
      color: #fff;
      padding: 10px 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .history-list { display: grid; gap: 8px; }
    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      padding: 10px;
    }
    .history-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }
    .history-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .history-fail {
      margin-top: 8px;
      border: 1px solid #efcf92;
      border-radius: 8px;
      background: #fff8ec;
      color: #6f4b13;
      padding: 8px;
      font-size: 13px;
    }
    .history-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .history-controls select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #fff;
      color: var(--text);
    }
    .history-summary {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>实验视频自动分析系统</h1>
      <div class="muted">主线: <code>integrated_system</code> | 访问地址: <code>http://localhost:5001</code></div>
    </div>

    <div class="card">
      <h2>1. 上传视频与开关</h2>
      <div class="row" style="margin-bottom: 10px;">
        <input id="videoInput" type="file" accept="video/*" />
        <span id="videoName" class="muted">尚未选择视频</span>
      </div>
      <div class="grid">
        <label class="opt"><input id="enableHand" type="checkbox" checked /> 手部检测</label>
        <label class="opt"><input id="enableAI" type="checkbox" checked /> AI 分析</label>
        <label class="opt"><input id="enablePDF" type="checkbox" checked /> PDF 报告</label>
        <label class="opt"><input id="enableStep" type="checkbox" checked /> 步骤检查</label>
        <label class="opt"><input id="enableVideo" type="checkbox" checked /> 导出标注视频</label>
      </div>
      <div class="row" style="margin-top: 12px;">
        <button id="startBtn">开始分析</button>
        <span id="taskIdText" class="muted"></span>
      </div>
    </div>

    <div class="card">
      <h2>2. 进度与状态</h2>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <div class="row" style="margin-top: 8px;">
        <div>进度: <b id="progressText">0%</b></div>
        <div>当前阶段: <b id="stageText">-</b></div>
        <div>状态: <b id="statusText">idle</b></div>
      </div>
      <div id="messageText" class="muted" style="margin-top: 6px;">等待任务开始</div>
    </div>

    <div class="card">
      <h2>3. 结果展示</h2>
      <div class="grid-2">
        <div>
          <div class="row" style="margin-bottom: 6px;">
            <b>标注视频</b>
            <span id="videoStatus" class="pill warn">未生成</span>
          </div>
          <video id="annotatedVideo" controls style="display:none;"></video>
          <div id="videoEmpty" class="muted">分析完成后显示标注视频预览</div>
        </div>
        <div>
          <div class="row" style="margin-bottom: 6px;">
            <b>文本总结</b>
            <span id="pdfStatus" class="pill warn">PDF 未知</span>
            <span id="alarmStatus" class="pill warn">alarm_log 未知</span>
          </div>
          <pre id="summaryBox">暂无摘要</pre>
        </div>
      </div>
      <div style="margin-top: 12px;">
        <div class="row" style="margin-bottom: 6px;">
          <b>关键帧预览</b>
          <span id="keyframeCount" class="muted">0 帧</span>
        </div>
        <div id="keyframeGrid" class="keyframes"></div>
      </div>
    </div>

    <div class="card">
      <h2>4. 下载</h2>
      <div class="downloads">
        <button class="secondary" data-type="annotated_video">下载标注视频</button>
        <button class="secondary" data-type="pdf">下载 PDF</button>
        <button class="secondary" data-type="keyframes_json">下载关键帧 JSON</button>
        <button class="secondary" data-type="analysis_json">下载 AI 分析 JSON</button>
        <button class="secondary" data-type="summary_txt">下载总结 TXT</button>
        <button class="secondary" data-type="alarm_log">下载 alarm_log.json</button>
        <button id="bundleBtn" class="secondary">一键下载 ZIP</button>
      </div>
      <div id="fileHint" class="file-hint">暂无可下载文件</div>
      <div id="fileLinks" class="file-links"></div>
      <pre id="resultBox">暂无结果</pre>
    </div>

    <div class="card">
      <h2>5. 任务历史</h2>
      <div class="history-controls">
        <label for="historyStatus">状态筛选</label>
        <select id="historyStatus">
          <option value="">全部</option>
          <option value="pending">pending</option>
          <option value="running">running</option>
          <option value="completed">completed</option>
          <option value="failed">failed</option>
        </select>
        <label for="retryMode">重试参数</label>
        <select id="retryMode">
          <option value="source">复用原任务参数</option>
          <option value="current">使用当前页面开关</option>
        </select>
        <button id="historyRefreshBtn" class="secondary">刷新历史</button>
      </div>
      <div id="historyStats" class="history-summary">统计加载中...</div>
      <div id="historyList" class="history-list">
        <div class="muted">暂无历史任务</div>
      </div>
      <div class="row" style="margin-top: 10px;">
        <button id="historyMoreBtn" class="secondary" style="display:none;">加载更多</button>
      </div>
    </div>

    <div class="card">
      <h2>6. 系统健康</h2>
      <div id="healthText" class="muted">检查中...</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let currentTaskId = "";
    let sse = null;
    let pollingTimer = null;
    let historyTimer = null;
    let historyStatusFilter = "";
    let historyOffset = 0;
    const historyLimit = 12;
    let historyHasMore = false;
    let lastStatus = "idle";

    const FILE_TYPE_TO_OUTPUT_KEY = {
      annotated_video: "annotated_video",
      pdf: "report",
      keyframes_json: "part1_keyframes",
      analysis_json: "analysis_json",
      summary_txt: "overall_summary",
      alarm_log: "alarm_log"
    };

    const FILE_LABEL = {
      annotated_video: "标注视频",
      pdf: "PDF 报告",
      keyframes_json: "关键帧 JSON",
      analysis_json: "AI 分析 JSON",
      summary_txt: "总结 TXT",
      alarm_log: "alarm_log.json"
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(v) {
      return String(v || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setProgress(progressValue) {
      const pct = Math.max(0, Math.min(100, Number(progressValue || 0)));
      $("bar").style.width = pct + "%";
      $("progressText").textContent = pct.toFixed(1) + "%";
    }

    function setStatusClass(status) {
      const n = $("statusText");
      n.className = "";
      if (status === "completed") n.className = "status-ok";
      if (status === "failed") n.className = "status-failed";
      if (status === "running" || status === "pending") n.className = "status-running";
    }

    function showToast(msg) {
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }

    function setDownloadEnabled(enabled, outputs) {
      document.querySelectorAll(".downloads button").forEach((btn) => {
        if (btn.id === "bundleBtn") return;
        if (!enabled) {
          btn.disabled = true;
          return;
        }
        const fileType = btn.getAttribute("data-type");
        const key = FILE_TYPE_TO_OUTPUT_KEY[fileType];
        btn.disabled = !(outputs && key && outputs[key]);
      });

      const bundleBtn = $("bundleBtn");
      const hasAny = outputs && Object.values(FILE_TYPE_TO_OUTPUT_KEY).some((k) => outputs[k]);
      bundleBtn.disabled = !(enabled && hasAny);
    }

    function setPill(id, ok, okText, badText) {
      const p = $(id);
      p.className = ok ? "pill ok" : "pill warn";
      p.textContent = ok ? okText : badText;
    }

    function renderArtifacts(artifacts) {
      const a = artifacts || {};
      const video = $("annotatedVideo");
      const empty = $("videoEmpty");

      if (a.annotated_video_url) {
        video.src = a.annotated_video_url;
        video.style.display = "block";
        empty.style.display = "none";
      } else {
        video.removeAttribute("src");
        video.style.display = "none";
        empty.style.display = "block";
      }

      setPill("videoStatus", !!a.annotated_video_exists, "已生成", "未生成");
      setPill("alarmStatus", !!a.alarm_log_exists, "alarm_log 已生成", "alarm_log 未生成");

      const pdfGenerated = !!a.pdf_generated;
      const pdfExists = !!a.pdf_exists;
      setPill("pdfStatus", pdfGenerated, "PDF 已生成", pdfExists ? "仅生成 TXT 报告" : "PDF 未生成");

      const summary = String(a.summary_text || "").trim();
      $("summaryBox").textContent = summary || "暂无摘要";

      const urls = Array.isArray(a.keyframe_image_urls) ? a.keyframe_image_urls : [];
      $("keyframeCount").textContent = `${urls.length} 帧`;
      const grid = $("keyframeGrid");
      grid.innerHTML = "";

      if (urls.length === 0) {
        grid.innerHTML = '<div class="muted">暂无关键帧</div>';
        return;
      }

      urls.slice(0, 24).forEach((url, i) => {
        const d = document.createElement("div");
        d.className = "kf";
        const idx = String(i + 1).padStart(3, "0");
        d.innerHTML = `<img src="${url}" alt="keyframe_${idx}"><div class="cap">keyframe_${idx}</div>`;
        grid.appendChild(d);
      });
    }

    function updateFileHint(status, outputs) {
      if (status !== "completed") {
        $("fileHint").innerHTML = '<span class="status-running">任务未完成，下载按钮暂不可用。</span>';
        $("fileLinks").innerHTML = "";
        return;
      }

      const ready = [];
      Object.entries(FILE_TYPE_TO_OUTPUT_KEY).forEach(([fileType, key]) => {
        if (outputs && outputs[key]) ready.push(fileType);
      });

      if (ready.length === 0) {
        $("fileHint").innerHTML = '<span class="status-failed">任务已完成，但未检测到可下载文件。</span>';
        $("fileLinks").innerHTML = "";
        return;
      }

      $("fileHint").innerHTML = `<span class="status-ok">可下载文件:</span> ${ready.map((x) => FILE_LABEL[x] || x).join("、")}`;
      $("fileLinks").innerHTML = ready
        .map((fileType) => `<a href="/api/download/${currentTaskId}/${fileType}" target="_blank" rel="noopener">下载${FILE_LABEL[fileType] || fileType}</a>`)
        .join("");
    }

    async function refreshHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        const modules = data.available_modules || {};
        const moduleText = Object.entries(modules)
          .map(([k, v]) => `${k}:${v ? "ok" : "missing"}`)
          .join(" | ");
        const degraded = Array.isArray(data.degraded_reasons) && data.degraded_reasons.length
          ? ` | 降级: ${data.degraded_reasons.join(", ")}`
          : "";

        $("healthText").innerHTML =
          `状态: <b class="status-ok">${data.status}</b> | API Key: <b>${data.api_key_configured ? "已配置" : "未配置(会跳过AI)"}</b> | 模块: ${moduleText} | 任务数: ${data.task_count}${degraded}`;
      } catch (err) {
        $("healthText").innerHTML = `<span class="status-failed">健康检查失败: ${err}</span>`;
      }
    }

    function activateTask(taskId) {
      if (!taskId) return;
      currentTaskId = taskId;
      $("taskIdText").textContent = `task_id: ${currentTaskId}`;
      connectSSE();
      if (pollingTimer) clearInterval(pollingTimer);
      pollingTimer = setInterval(fetchStatus, 1500);
      fetchStatus();
    }

    async function refreshTaskHistory(reset = true) {
      try {
        if (reset) historyOffset = 0;
        const qs = new URLSearchParams();
        qs.set("limit", String(historyLimit));
        qs.set("offset", String(historyOffset));
        if (historyStatusFilter) qs.set("status", historyStatusFilter);
        const url = `/api/tasks?${qs.toString()}`;
        const res = await fetch(url);
        const data = await res.json();
        const tasks = Array.isArray(data.tasks) ? data.tasks : [];
        const wrap = $("historyList");
        if (reset) wrap.innerHTML = "";

        if (reset && tasks.length === 0) {
          wrap.innerHTML = '<div class="muted">暂无历史任务</div>';
          $("historyStats").textContent = "共 0 条任务";
          $("historyMoreBtn").style.display = "none";
          return;
        }

        const counts = data.status_counts || {};
        $("historyStats").textContent =
          `共 ${Number(data.total || 0)} 条 | pending ${Number(counts.pending || 0)} | running ${Number(counts.running || 0)} | completed ${Number(counts.completed || 0)} | failed ${Number(counts.failed || 0)}`;

        tasks.forEach((task) => {
          const id = String(task.task_id || "");
          const status = String(task.status || "unknown");
          const stage = String(task.current_stage || "-");
          const msg = String(task.message || "");
          const createdAt = String(task.created_at || "-");
          const updatedAt = String(task.updated_at || "-");
          const fail = task.failure || null;
          const canRetry = !!task.can_retry;
          const statusClass =
            status === "completed"
              ? "pill ok"
              : status === "failed"
                ? "pill warn"
                : "pill";

          const failHtml = fail
            ? `<div class="history-fail"><b>${escapeHtml(fail.level)} ${escapeHtml(fail.title)}</b> (${escapeHtml(fail.category)})<br>阶段: ${escapeHtml(fail.stage)}<br>说明: ${escapeHtml(fail.message || msg)}<br>建议: ${escapeHtml(fail.hint)}</div>`
            : "";

          const activeLabel = currentTaskId && currentTaskId === id ? "当前查看中" : "查看";
          const item = document.createElement("div");
          item.className = "history-item";
          const retryBtn = (status === "failed" && canRetry)
            ? `<button class="secondary history-retry-btn" data-task-id="${escapeHtml(id)}">重试</button>`
            : "";
          item.innerHTML = `
            <div class="history-top">
              <div>
                <code>${escapeHtml(id)}</code>
                <span class="${statusClass}">${escapeHtml(status)}</span>
              </div>
              <div>
                <button class="secondary history-view-btn" data-task-id="${escapeHtml(id)}">${activeLabel}</button>
                ${retryBtn}
              </div>
            </div>
            <div class="history-meta">阶段: ${escapeHtml(stage)} | 创建: ${escapeHtml(createdAt)} | 更新: ${escapeHtml(updatedAt)}</div>
            <div class="history-meta">消息: ${escapeHtml(msg || "-")}</div>
            ${failHtml}
          `;
          wrap.appendChild(item);
        });

        historyOffset += tasks.length;
        historyHasMore = !!data.has_more;
        $("historyMoreBtn").style.display = historyHasMore ? "inline-block" : "none";
      } catch (err) {
        $("historyList").innerHTML = `<div class="status-failed">任务历史加载失败: ${escapeHtml(err)}</div>`;
        $("historyMoreBtn").style.display = "none";
      }
    }

    async function retryTask(sourceTaskId) {
      if (!sourceTaskId) return;
      try {
        const useCurrent = $("retryMode").value === "current";
        const form = new FormData();
        if (useCurrent) {
          form.append("enable_hand_detection", $("enableHand").checked ? "1" : "0");
          form.append("enable_ai_analysis", $("enableAI").checked ? "1" : "0");
          form.append("enable_pdf", $("enablePDF").checked ? "1" : "0");
          form.append("enable_step_check", $("enableStep").checked ? "1" : "0");
          form.append("enable_video_export", $("enableVideo").checked ? "1" : "0");
        }
        const res = await fetch(`/api/retry/${sourceTaskId}`, {
          method: "POST",
          body: useCurrent ? form : undefined,
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "重试提交失败");
        showToast(`已创建重试任务: ${data.task_id}`);
        activateTask(String(data.task_id || ""));
        await refreshTaskHistory(true);
      } catch (err) {
        showToast(`重试失败: ${err}`);
      }
    }

    async function fetchStatus() {
      if (!currentTaskId) return;

      const res = await fetch(`/api/status/${currentTaskId}`);
      const data = await res.json();
      if (!data.ok) return;

      setProgress(data.progress);
      $("stageText").textContent = data.current_stage || "-";
      $("statusText").textContent = data.status || "-";
      setStatusClass(data.status);
      $("messageText").textContent = data.message || "";
      $("resultBox").textContent = JSON.stringify(data, null, 2);

      renderArtifacts(data.artifacts || {});
      setDownloadEnabled(data.status === "completed", data.outputs || {});
      updateFileHint(data.status, data.outputs || {});

      if (lastStatus !== "completed" && data.status === "completed") {
        showToast("任务已完成，可预览并下载结果");
      }
      if (lastStatus !== "failed" && data.status === "failed") {
        showToast("任务失败，请查看结果区错误信息");
      }
      lastStatus = data.status || lastStatus;

      if (data.status === "completed" || data.status === "failed") {
        if (pollingTimer) {
          clearInterval(pollingTimer);
          pollingTimer = null;
        }
      }
    }

    function connectSSE() {
      if (!currentTaskId) return;
      if (sse) sse.close();

      sse = new EventSource(`/api/progress?task_id=${currentTaskId}&start=recent`);
      sse.onmessage = (evt) => {
        try {
          const d = JSON.parse(evt.data || "{}");
          if (d.type === "heartbeat") return;
          setProgress(d.progress);
          $("stageText").textContent = d.current_stage || "-";
          $("messageText").textContent = d.message || "";
        } catch (_) {
          // ignore parse errors
        }
      };

      sse.onerror = () => {
        if (sse) sse.close();
      };
    }

    $("videoInput").addEventListener("change", () => {
      const file = $("videoInput").files[0];
      $("videoName").textContent = file ? `已选择: ${file.name}` : "尚未选择视频";
    });

    $("startBtn").addEventListener("click", async () => {
      const file = $("videoInput").files[0];
      if (!file) {
        alert("请先选择视频文件");
        return;
      }

      const form = new FormData();
      form.append("video", file);
      form.append("enable_hand_detection", $("enableHand").checked ? "1" : "0");
      form.append("enable_ai_analysis", $("enableAI").checked ? "1" : "0");
      form.append("enable_pdf", $("enablePDF").checked ? "1" : "0");
      form.append("enable_step_check", $("enableStep").checked ? "1" : "0");
      form.append("enable_video_export", $("enableVideo").checked ? "1" : "0");

      $("startBtn").disabled = true;
      setDownloadEnabled(false, null);
      renderArtifacts({});
      updateFileHint("running", null);
      $("messageText").textContent = "任务提交中...";
      $("resultBox").textContent = "任务已提交，等待后端执行...";
      setProgress(0);

      try {
        const res = await fetch("/api/analyze", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "任务提交失败");

        currentTaskId = data.task_id;
        lastStatus = data.status || "pending";
        $("taskIdText").textContent = `task_id: ${currentTaskId}`;
        $("statusText").textContent = data.status || "pending";
        setStatusClass(data.status || "pending");

        connectSSE();
        if (pollingTimer) clearInterval(pollingTimer);
        pollingTimer = setInterval(fetchStatus, 1500);
        await fetchStatus();
        await refreshTaskHistory();
      } catch (err) {
        $("messageText").textContent = `提交失败: ${err}`;
      } finally {
        $("startBtn").disabled = false;
      }
    });

    document.querySelectorAll(".downloads button").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (!currentTaskId) {
          alert("请先运行任务");
          return;
        }
        if (btn.id === "bundleBtn") {
          window.open(`/api/download_bundle/${currentTaskId}`, "_blank");
          return;
        }
        const t = btn.getAttribute("data-type");
        window.open(`/api/download/${currentTaskId}/${t}`, "_blank");
      });
    });

    document.addEventListener("click", (evt) => {
      const target = evt.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.classList.contains("history-view-btn")) {
        const taskId = target.getAttribute("data-task-id") || "";
        activateTask(taskId);
        return;
      }
      if (target.classList.contains("history-retry-btn")) {
        const sourceTaskId = target.getAttribute("data-task-id") || "";
        retryTask(sourceTaskId);
      }
    });

    $("historyStatus").addEventListener("change", () => {
      historyStatusFilter = $("historyStatus").value || "";
      refreshTaskHistory(true);
    });
    $("historyRefreshBtn").addEventListener("click", () => {
      refreshTaskHistory(true);
    });
    $("historyMoreBtn").addEventListener("click", () => {
      if (!historyHasMore) return;
      refreshTaskHistory(false);
    });

    setDownloadEnabled(false, null);
    renderArtifacts({});
    updateFileHint("idle", null);
    refreshHealth();
    refreshTaskHistory(true);
    setInterval(refreshHealth, 10000);
    historyTimer = setInterval(() => refreshTaskHistory(true), 5000);
  </script>
</body>
</html>
