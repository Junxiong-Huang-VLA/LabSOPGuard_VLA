# Optional runtime services for a fuller local deployment.
# Optional .env overrides are supported, but this file has safe local defaults:
#   docker compose -f docker-compose.runtime.yml up --build

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labembodied}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labembodied}
      POSTGRES_DB: ${POSTGRES_DB:-labembodied}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      PYTHONPATH: /app/src
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-labembodied}:${POSTGRES_PASSWORD:-labembodied}@postgres:5432/${POSTGRES_DB:-labembodied}
      LAB_MODELS_DIR: /models
      LAB_VIDEO_STORE_ROOT: /videos/raw_uploads
      LAB_MATERIAL_LIBRARY_ROOT: /materials
      YOLO_CONFIG_DIR: /app/.ultralytics
    volumes:
      - ./outputs:/app/outputs
      - ./memory:/app/memory
      - ./.runtime:/app/.runtime
      - ${LAB_MODELS_DIR:-D:/LabModels}:/models:ro
      - ${LAB_VIDEO_STORE_ROOT:-D:/LabVideo/raw_uploads}:/videos/raw_uploads
      - ${LAB_MATERIAL_LIBRARY_ROOT:-D:/LabMaterialLibrary}:/materials
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
